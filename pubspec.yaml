name: tao996
description: "A new Flutter plugin project."
version: 0.0.1
#homepage:

environment:
  sdk: ^3.8.1
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  plugin_platform_interface: ^2.0.2
  connectivity_plus: ^6.1.3 # https://pub.dev/packages/connectivity_plus 网络状态检查
  fluttertoast: ^8.2.12
  dynamic_color: ^1.7.0
  dio: ^5.8.0+1
  get: ^4.7.2
  get_it: ^8.0.3
  logger: ^2.5.0
  share_plus: ^10.1.4
  shared_preferences: ^2.5.3 # https://pub.dev/packages/shared_preferences 简单的设置保存
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5
  file_picker: ^10.0.0
  url_launcher: ^6.3.1
  intl: ^0.20.2
  flutter_cache_manager: ^3.4.1
  visibility_detector: ^0.4.0+2
  cached_network_image: ^3.4.1
  flutter_image_gallery_saver: ^0.0.2
  permission_handler: ^12.0.0+1
  qr_code_scanner_plus: ^2.0.10+1
  pull_to_refresh: ^2.0.0
  flutter_svg: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.fushuilu.tao996
        pluginClass: Tao996Plugin
      ios:
        pluginClass: Tao996Plugin
      linux:
        pluginClass: Tao996Plugin
      macos:
        pluginClass: Tao996Plugin
      windows:
        pluginClass: Tao996PluginCApi

