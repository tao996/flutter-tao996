name: tao996
description: "A new Flutter plugin project."
version: 0.0.1
#homepage:

environment:
  sdk: ^3.8.1
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  plugin_platform_interface: ^2.0.2
  connectivity_plus: ^7.0.0 # https://pub.dev/packages/connectivity_plus 网络状态检查
  fluttertoast: ^9.0.0
#  bot_toast: ^4.1.3
  dynamic_color: ^1.7.0
  dio: ^5.8.0+1
  get: ^4.7.2
  get_it: ^9.2.1
  logger: ^2.5.0
  share_plus: ^12.0.1
  shared_preferences: ^2.5.3 # https://pub.dev/packages/shared_preferences 简单的设置保存
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5
  file_picker: ^10.0.0
  image_picker: ^1.2.0
  url_launcher: ^6.3.1
  intl: ^0.20.2
  flutter_cache_manager: ^3.4.1
  visibility_detector: ^0.4.0+2
  cached_network_image: ^3.4.1
  flutter_image_gallery_saver: ^1.1.3
  permission_handler: ^12.0.0+1
  qr_code_scanner_plus: ^2.0.10+1
  pull_to_refresh: ^2.0.0
  flutter_svg: ^2.2.0
  json_annotation: ^4.9.0
  archive: ^4.0.9
  file_selector: ^1.0.4
  mime: ^2.0.0
  crypto: ^3.0.7
  http: ^1.6.0
  flex_color_picker: ^3.7.2
  uuid: ^4.5.2
#  collection: ^1.19.1

  mockito: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  test: ^1.25.15
  build_runner: ^2.7.1
  #  flutter pub run build_runner build
  # 注意 build.yaml 中限制了扫描范围
  json_serializable: ^6.11.1

flutter:
  plugin:
    platforms:
      android:
        package: com.fushuilu.tao996
        pluginClass: Tao996Plugin
      ios:
        pluginClass: Tao996Plugin
      linux:
        pluginClass: Tao996Plugin
      macos:
        pluginClass: Tao996Plugin
      windows:
        pluginClass: Tao996PluginCApi

